<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>George Hacks - Reset Password</title>
  <meta name="description" content="Reset your password for George Hacks." />

  <link rel="stylesheet" href="../app/bootstrap/css/bootstrap.css" />
  <link rel="stylesheet" href="../app/dist/app.css" />
  <link rel="stylesheet" href="../app/dist/signin.css" />

  <link rel="shortcut icon" href="../assets/images/last.svg" />
  <link rel="apple-touch-icon-precomposed" href="../assets/images/last.svg" />
</head>

<body class="header-fixed main">
  <div id="wrapper">
    <header id="header_main" class="header">
      <div class="container">
        <div id="site-header-inner">
          <nav id="main-nav" class="main-nav">
            <ul id="menu-primary-menu" class="menu">
              <li class="menu-item"><a href="../index.html#home">Home</a></li>
              <li class="menu-item"><a href="../index.html#faqs">FAQs</a></li>
              <li class="menu-item"><a href="../index.html#contact">Contact</a></li>
            </ul>
          </nav>

          <div class="header-cta">
            <a href="./signin.html" class="tf-button btn-effect">
              <span class="boder-fade"></span>
              <span class="effect">Back</span>
            </a>
          </div>

          <div class="mobile-button"><span></span></div>
        </div>
      </div>
    </header>

    <section class="gh-signin">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6 col-md-8">
            <div class="corner-box gh-signin__card">
              <h2 class="gh-signin__title">
                Reset <span class="gh-signin__accent">Password</span>
              </h2>

              <form id="resetForm" class="form-contact" autocomplete="off" novalidate>
                <fieldset class="mb-3">
                  <label class="gh-signin__label" for="newPassword">New Password</label>
                  <input type="password" id="newPassword" name="newPassword"
                    placeholder="New password" autocomplete="new-password" required />
                </fieldset>

                <fieldset class="mb-3">
                  <label class="gh-signin__label" for="confirmPassword">Confirm Password</label>
                  <input type="password" id="confirmPassword" name="confirmPassword"
                    placeholder="Confirm password" autocomplete="new-password" required />
                </fieldset>

                <div class="gh-signin__actions">
                  <button type="submit" class="tf-button-st2 btn-effect">
                    <span class="boder-fade"></span>
                    <span class="effect">Update Password</span>
                  </button>
                </div>

                <div id="resetMessage" class="gh-signin__error" aria-live="polite"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="../app/js/gh-config.js"></script>
  <script src="../app/js/gh-fetch.js"></script>
  <script type="module" src="../app/js/reset-password.js"></script>
</body>
</html>
