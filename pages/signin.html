<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>George Hacks - Sign In</title>
  <meta name="description" content="George Hacks Sign In Portal" />

  <!-- Correct paths (since file is inside /pages/) -->
  <link rel="stylesheet" href="../app/bootstrap/css/bootstrap.css" />
  <link rel="stylesheet" href="../app/dist/app.css" />
  <link rel="stylesheet" href="../app/dist/signin.css" />

  <link rel="shortcut icon" href="../assets/images/last.svg" />
  <link rel="apple-touch-icon-precomposed" href="../assets/images/last.svg" />
</head>

<body class="header-fixed main">
  <div id="wrapper">

    <!-- Header -->
    <header id="header_main" class="header">
      <div class="container">
        <div id="site-header-inner">


          <nav id="main-nav" class="main-nav">
            <ul id="menu-primary-menu" class="menu">
              <li class="menu-item"><a href="../index.html#home">Home</a></li>
              <li class="menu-item"><a href="../index.html#faqs">FAQs</a></li>
              <li class="menu-item"><a href="../index.html#contact">Contact</a></li>
            </ul>
          </nav>

          <div class="header-cta">
            <a href="../index.html" class="tf-button btn-effect">
              <span class="boder-fade"></span>
              <span class="effect">Back</span>
            </a>
          </div>

          <div class="mobile-button"><span></span></div>

        </div>
      </div>
    </header>
   
    <section class="gh-signin">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6 col-md-8">

            <div class="corner-box gh-signin__card">
              <h2 class="gh-signin__title">
                Sign <span class="gh-signin__accent">In</span>
              </h2>

           

              <form id="signinForm" class="form-contact" autocomplete="off" novalidate>

                <fieldset class="mb-3">
                  <label class="gh-signin__label" for="email">Email</label>
                  <input type="email" id="email" name="email"
                    placeholder="Email address" autocomplete="off" required />
                </fieldset>

                <fieldset class="mb-3">
                  <div style="display:flex; align-items:center; justify-content:space-between;">
                    <label class="gh-signin__label" for="password">Password</label>
                    <!-- <button type="button" id="forgotPasswordBtn" class="gh-mini" style="color:#67B8FF; background:transparent; border:none; padding:0;">
                      Forgot password?
                    </button> -->
                  </div>
                  <input type="password" id="password" name="password"
                    placeholder="Password" autocomplete="off" required />
                </fieldset>

                <div class="gh-signin__actions">
                  <button type="submit" class="tf-button-st2 btn-effect">
                    <span class="boder-fade"></span>
                    <span class="effect">Sign In</span>
                  </button>
                </div>
                <div id="signinError" class="gh-signin__error" aria-live="polite"></div>

             

              </form>

              <div id="otpSection" style="display:none; margin-top:16px;">
                <fieldset class="mb-3">
                  <label class="gh-signin__label" for="otpCode">Email OTP</label>
                  <input type="text" id="otpCode" name="otpCode"
                    placeholder="Enter the 6-digit code" autocomplete="one-time-code" />
                </fieldset>

                <div class="gh-signin__actions">
                  <button type="button" id="otpVerifyBtn" class="tf-button-st2 btn-effect">
                    <span class="boder-fade"></span>
                    <span class="effect">Verify Code</span>
                  </button>
                </div>

                <div id="otpMessage" class="gh-signin__error" aria-live="polite"></div>
              </div>

              <!-- Magic Link (OTP) login for admins - disabled for now -->
              <!--
              <div class="gh-signin__otp">
                <h4 class="gh-signin__label" style="margin-top:20px;">Admin Magic Link</h4>
                <form id="otpRequestForm" class="form-contact" autocomplete="on" novalidate>
                  <fieldset class="mb-3">
                    <label class="gh-signin__label" for="otpEmail">Email</label>
                    <input type="email" id="otpEmail" name="otpEmail"
                      placeholder="Admin email address" autocomplete="email" required />
                  </fieldset>

                  <div class="gh-signin__actions">
                    <button type="submit" class="tf-button-st2 btn-effect">
                      <span class="boder-fade"></span>
                      <span class="effect">Send Magic Link</span>
                    </button>
                  </div>
                </form>

                <div id="otpMessage" class="gh-signin__error" aria-live="polite"></div>
              </div>
              -->

              <div id="signinSuccess" class="gh-signin__success" style="display:none;">
                <p class="gh-signin__success-text">Signin success.</p>
                <button id="signoutBtn" type="button" class="tf-button-st2 btn-effect">
                  <span class="boder-fade"></span>
                  <span class="effect">Sign Out</span>
                </button>
              </div>

            </div>

          </div>
        </div>
      </div>
    </section>

  </div>

  <script src="../app/js/gh-config.js"></script>
  <script src="../app/js/gh-fetch.js"></script>
  <script type="module" src="../app/js/signin.js"></script>

</body>
</html>
